<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>StudyHub AI</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://apis.google.com/js/api.js" async defer></script>
<style>
/* ===== THEME VARIABLES ===== */
:root {
  --bg: #0b0a12;
  --bg2: #13111f;
  --surface: rgba(30,28,45,0.95);
  --border: rgba(255,255,255,0.07);
  --text: #ffffff;
  --text-muted: #6b6880;
  --accent: #7c6ff7;
  --accent-glow: rgba(124,111,247,0.25);
  --star: #f9ca24;
  --danger: #ff6b6b;
  --success: #43e97b;
  --input-bg: rgba(0,0,0,0.3);
}
[data-theme="light"] {
  --bg: #f0effe;
  --bg2: #e8e5fd;
  --surface: rgba(255,255,255,0.85);
  --border: rgba(0,0,0,0.08);
  --text: #1a1828;
  --text-muted: #8b88a0;
  --input-bg: rgba(255,255,255,0.6);
}

/* ===== BASE ===== */
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Poppins', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  transition: background 0.3s, color 0.3s;
  overflow-x: hidden;
}

/* Kill leaked nodes */
body > *:not(#app-root):not(script):not(style) { display: none !important; }

/* Background blobs */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 60% 40% at 15% 20%, rgba(124,111,247,0.1) 0%, transparent 60%),
    radial-gradient(ellipse 50% 40% at 85% 75%, rgba(67,233,123,0.06) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}

#app-root { position: relative; z-index: 1; }

/* ===== GLASS ===== */
.glass {
  background: var(--surface);
  border: 1px solid var(--border);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-radius: 20px;
}

/* ===== NAV ===== */
.nav {
  position: sticky;
  top: 0;
  z-index: 200;
  margin: 12px 12px 0;
  padding: 14px 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
}

.nav-logo {
  font-size: 1.1rem;
  font-weight: 900;
  letter-spacing: -0.5px;
  white-space: nowrap;
}

.nav-logo span { color: var(--accent); }

.nav-actions { display: flex; gap: 10px; align-items: center; }

.icon-btn {
  background: var(--input-bg);
  border: 1px solid var(--border);
  border-radius: 12px;
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 1rem;
  transition: all 0.2s;
  color: var(--text);
  flex-shrink: 0;
}
.icon-btn:hover { border-color: var(--accent); background: var(--accent-glow); }

.auth-btn {
  background: var(--accent);
  border: none;
  border-radius: 30px;
  color: white;
  font-family: 'Poppins', sans-serif;
  font-size: 0.6rem;
  font-weight: 900;
  letter-spacing: 1px;
  padding: 7px 14px;
  cursor: pointer;
  transition: all 0.3s;
  text-transform: uppercase;
  white-space: nowrap;
}
.auth-btn.connected { background: var(--success); color: #0b0a12; }
.auth-btn:hover { opacity: 0.85; transform: scale(1.03); }

/* ===== SETTINGS PANEL ===== */
.settings-panel {
  margin: 8px 12px;
  padding: 20px;
  display: none;
}
.settings-panel.open { display: block; animation: fadeDown 0.25s ease; }

@keyframes fadeDown {
  from { opacity: 0; transform: translateY(-10px); }
  to { opacity: 1; transform: translateY(0); }
}

.settings-label {
  font-size: 0.6rem;
  font-weight: 900;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 2px;
  margin-bottom: 14px;
}

.inp {
  width: 100%;
  background: var(--input-bg);
  border: 1.5px solid var(--border);
  border-radius: 14px;
  padding: 12px 14px;
  font-family: 'Poppins', sans-serif;
  font-size: 0.78rem;
  color: var(--text);
  outline: none;
  transition: border 0.2s;
  margin-bottom: 10px;
}
.inp:focus { border-color: var(--accent); }
.inp::placeholder { color: var(--text-muted); }

.btn-primary {
  width: 100%;
  background: var(--accent);
  border: none;
  border-radius: 14px;
  color: white;
  font-family: 'Poppins', sans-serif;
  font-weight: 700;
  font-size: 0.7rem;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 12px;
  cursor: pointer;
  transition: all 0.3s;
  box-shadow: 0 4px 20px var(--accent-glow);
}
.btn-primary:hover { opacity: 0.85; }

.btn-danger {
  width: 100%;
  background: transparent;
  border: 1.5px solid rgba(255,107,107,0.4);
  border-radius: 14px;
  color: var(--danger);
  font-family: 'Poppins', sans-serif;
  font-weight: 700;
  font-size: 0.7rem;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 12px;
  cursor: pointer;
  transition: all 0.2s;
  margin-top: 10px;
}
.btn-danger:hover { background: rgba(255,107,107,0.1); }

.divider {
  border: none;
  border-top: 1px solid var(--border);
  margin: 16px 0;
}

/* ===== MAIN ===== */
main {
  padding: 12px;
  max-width: 680px;
  margin: 0 auto;
}

/* ===== SYNC CARD ===== */
.sync-card { padding: 18px; margin-bottom: 14px; }

.sync-row {
  display: flex;
  gap: 10px;
  align-items: stretch;
  margin-bottom: 10px;
}

.sync-input-wrap { flex: 1; position: relative; }

.sync-btn {
  background: var(--text);
  color: var(--bg);
  border: none;
  border-radius: 16px;
  font-family: 'Poppins', sans-serif;
  font-weight: 900;
  font-size: 0.6rem;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 0 18px;
  cursor: pointer;
  transition: all 0.3s;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
  flex-shrink: 0;
}
.sync-btn:hover { opacity: 0.8; }
.sync-btn:active { transform: scale(0.97); }
.sync-btn.syncing { background: var(--accent); color: white; }

#fileCounter {
  font-size: 0.5rem;
  opacity: 0.6;
  font-weight: 400;
}

.search-wrap { position: relative; }
.search-icon { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); opacity: 0.4; font-size: 0.9rem; }

/* ===== SECTION LABELS ===== */
.sec-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
  padding: 0 2px;
}
.sec-label {
  font-size: 0.55rem;
  font-weight: 900;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 2px;
}
.bookmark-btn {
  font-size: 0.6rem;
  color: var(--accent);
  font-weight: 700;
  cursor: pointer;
  background: none;
  border: none;
  font-family: 'Poppins', sans-serif;
  padding: 4px 8px;
  border-radius: 8px;
  transition: background 0.2s;
}
.bookmark-btn:hover { background: var(--accent-glow); }
.bookmark-btn.bookmarked { color: var(--star); }

/* ===== TABS ===== */
.tabs-scroll {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  padding-bottom: 4px;
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
}
.tabs-scroll::-webkit-scrollbar { display: none; }

.tab-btn {
  background: var(--input-bg);
  border: 1.5px solid var(--border);
  border-radius: 30px;
  color: var(--text-muted);
  font-family: 'Poppins', sans-serif;
  font-size: 0.65rem;
  font-weight: 700;
  padding: 7px 16px;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.2s;
  flex-shrink: 0;
}
.tab-btn:hover { border-color: var(--accent); color: var(--accent); }
.tab-btn.active { background: var(--accent); border-color: var(--accent); color: white; }

/* ===== QUICK ACCESS ===== */
.quick-chip {
  background: var(--input-bg);
  border: 1.5px solid rgba(124,111,247,0.3);
  border-radius: 30px;
  color: var(--accent);
  font-family: 'Poppins', sans-serif;
  font-size: 0.6rem;
  font-weight: 700;
  padding: 6px 14px;
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 5px;
}
.quick-chip:hover { background: var(--accent-glow); }
.quick-chip .remove-pin {
  opacity: 0.5;
  font-size: 0.7rem;
  line-height: 1;
}
.quick-chip .remove-pin:hover { opacity: 1; color: var(--danger); }

/* ===== FILE CARDS ===== */
.file-card {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 14px;
  margin-bottom: 8px;
  border-radius: 16px;
  background: var(--input-bg);
  border: 1px solid var(--border);
  transition: all 0.2s;
  cursor: pointer;
  min-width: 0;
}
.file-card:hover { border-color: rgba(124,111,247,0.4); background: var(--accent-glow); }

.file-icon { width: 28px; height: 28px; flex-shrink: 0; opacity: 0.7; }

.file-info {
  flex: 1;
  min-width: 0;
  overflow: hidden;
}

.file-name {
  font-size: 0.8rem;
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  color: var(--text);
}

.file-meta {
  font-size: 0.55rem;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-top: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* CRITICAL: Star button always fixed right, never disappears */
.star-btn {
  flex-shrink: 0;
  width: 32px;
  height: 32px;
  border: none;
  background: none;
  font-size: 1.1rem;
  cursor: pointer;
  color: var(--text-muted);
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 8px;
  margin-left: auto;
}
.star-btn:hover { background: rgba(249,202,36,0.15); }
.star-btn.starred { color: var(--star); }

/* ===== SECTIONS ===== */
.nav-section { margin-bottom: 16px; }
.nav-section.hidden-section { display: none; }

/* ===== STARRED PAGE ===== */
.view-tabs {
  display: flex;
  gap: 8px;
  margin-bottom: 14px;
}
.view-tab {
  flex: 1;
  background: var(--input-bg);
  border: 1.5px solid var(--border);
  border-radius: 14px;
  color: var(--text-muted);
  font-family: 'Poppins', sans-serif;
  font-size: 0.65rem;
  font-weight: 700;
  padding: 10px;
  cursor: pointer;
  text-align: center;
  transition: all 0.2s;
}
.view-tab.active { background: var(--accent); border-color: var(--accent); color: white; }

/* ===== EMPTY STATE ===== */
.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--text-muted);
}
.empty-icon { font-size: 2.5rem; margin-bottom: 10px; opacity: 0.4; }
.empty-text { font-size: 0.8rem; }

/* ===== TOAST ===== */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--success);
  color: #0b0a12;
  font-family: 'Poppins', sans-serif;
  font-weight: 700;
  font-size: 0.75rem;
  padding: 10px 20px;
  border-radius: 30px;
  z-index: 9999;
  transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
  box-shadow: 0 4px 20px rgba(67,233,123,0.4);
  white-space: nowrap;
}
.toast.show { transform: translateX(-50%) translateY(0); }
.toast.error { background: var(--danger); color: white; }

/* ===== PROGRESS BAR ===== */
.progress-bar {
  height: 3px;
  background: var(--border);
  border-radius: 2px;
  margin-top: 10px;
  overflow: hidden;
  display: none;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--success));
  border-radius: 2px;
  width: 0%;
  transition: width 0.3s;
}

/* ===== SPINNING ===== */
@keyframes spin { to { transform: rotate(360deg); } }
.spinning { display: inline-block; animation: spin 1s linear infinite; }

/* ===== RESPONSIVE ===== */
@media (max-width: 400px) {
  .nav { padding: 12px 14px; }
  .nav-logo { font-size: 0.95rem; }
  main { padding: 8px; }
  .sync-card { padding: 14px; }
}
</style>
</head>
<body>
<div id="app-root">

<!-- NAV -->
<nav class="glass nav">
  <div class="nav-logo">StudyHub <span>AI</span></div>
  <div class="nav-actions">
    <button class="icon-btn" id="themeBtn" onclick="toggleTheme()" title="Toggle Theme">🌙</button>
    <button class="icon-btn" onclick="toggleSettings()" title="Settings">⚙️</button>
    <button class="auth-btn" id="authBtn" onclick="handleAuthClick()">Connect</button>
  </div>
</nav>

<!-- SETTINGS PANEL -->
<div class="glass settings-panel" id="settingsPanel">
  <div class="settings-label">🔐 API Configuration</div>
  <input class="inp" type="text" id="clientIdInput" placeholder="Client ID (OAuth 2.0)">
  <input class="inp" type="password" id="apiKeyInput" placeholder="API Key">
  <button class="btn-primary" onclick="saveSettings()">💾 Save & Reload</button>
  <hr class="divider">
  <div class="settings-label" style="margin-top:0">⚠️ Cache</div>
  <button class="btn-danger" onclick="clearFilesOnly()">🗑 Clear Files Cache (keep keys)</button>
</div>

<!-- MAIN -->
<main>

  <!-- SYNC CARD -->
  <div class="glass sync-card">
    <div class="sync-row">
      <div class="sync-input-wrap">
        <input class="inp" style="margin:0" type="text" id="folderIdInput" placeholder="Paste Google Drive folder link or ID...">
      </div>
      <button class="sync-btn" id="syncBtn" onclick="startScanning()">
        <span id="syncBtnLabel">Sync</span>
        <span id="fileCounter">0 files</span>
      </button>
    </div>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="inp" style="margin:0;padding-right:38px" type="text" id="searchBar" oninput="renderFiles()" placeholder="Search files...">
    </div>
    <div class="progress-bar" id="progressBar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
  </div>

  <!-- VIEW TABS: Browse / Starred -->
  <div class="view-tabs">
    <button class="view-tab active" id="vt-browse" onclick="switchView('browse')">📂 Browse</button>
    <button class="view-tab" id="vt-starred" onclick="switchView('starred')">⭐ Starred (<span id="starCount">0</span>)</button>
  </div>

  <!-- BROWSE VIEW -->
  <div id="browseView">

    <!-- QUICK ACCESS -->
    <div id="quickAccessSection" style="display:none; margin-bottom:16px;">
      <div class="sec-header">
        <span class="sec-label">📍 Quick Access</span>
      </div>
      <div class="tabs-scroll" id="quickAccessGrid"></div>
    </div>

    <!-- LEVEL 1: YEAR -->
    <div class="nav-section" id="yearSection">
      <div class="sec-header">
        <span class="sec-label">Level 1 · Year / Term</span>
        <button class="bookmark-btn" id="pinBtn" onclick="toggleNavPin()">★ Pin Path</button>
      </div>
      <div class="tabs-scroll" id="yearTabs"></div>
    </div>

    <!-- LEVEL 2: SUBJECT -->
    <div class="nav-section hidden-section" id="subjectSection">
      <div class="sec-header">
        <span class="sec-label">Level 2 · Subject</span>
      </div>
      <div class="tabs-scroll" id="subjectTabs"></div>
    </div>

    <!-- LEVEL 3: CATEGORY -->
    <div class="nav-section hidden-section" id="categorySection">
      <div class="sec-header">
        <span class="sec-label">Level 3 · Category</span>
      </div>
      <div class="tabs-scroll" id="typeTabs"></div>
    </div>

    <!-- FILES -->
    <div id="fileGrid" style="margin-top:12px; padding-bottom:40px;"></div>

  </div><!-- /browseView -->

  <!-- STARRED VIEW -->
  <div id="starredView" style="display:none; padding-bottom:40px;">
    <div id="starredGrid"></div>
  </div>

</main>
</div><!-- /app-root -->

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
/* ============================================================
   StudyHub AI — Full Version
   Features: Google Drive API, Glassmorphism, Light/Dark,
   Stars, Path Pinning, Token Refresh, DOM Sanitization,
   Responsive, LocalStorage, File Counter
   ============================================================ */

// ===== STATE =====
let CONF    = safeLoad('study_conf', {ci:'', ak:''});
let FILES   = safeLoad('study_files', []);
let STARS   = safeLoad('study_stars', []);
let PINS    = safeLoad('study_pins', []);
let THEME   = localStorage.getItem('study_theme') || 'dark';
let VIEW    = 'browse';
let sY='all', sS='all', sC='all';
let tokenClient = null;
let accToken    = null;
let tokenTimer  = null;
let isScanning  = false;

function safeLoad(key, def) {
  try { return JSON.parse(localStorage.getItem(key)) || def; } catch { return def; }
}
function safeSave(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch(e) { console.warn('Storage full'); }
}

// ===== DOM SANITIZATION =====
// Kill any leaked text or rogue elements every 2s
setInterval(() => {
  document.querySelectorAll('body > *:not(#app-root):not(script):not(style)').forEach(e => e.remove());
  document.body.childNodes.forEach(n => { if (n.nodeType === 3) n.textContent = ''; });
}, 2000);

// ===== THEME =====
function applyTheme() {
  document.documentElement.setAttribute('data-theme', THEME);
  document.getElementById('themeBtn').textContent = THEME === 'dark' ? '🌙' : '☀️';
}

function toggleTheme() {
  THEME = THEME === 'dark' ? 'light' : 'dark';
  localStorage.setItem('study_theme', THEME);
  applyTheme();
}

// ===== SETTINGS =====
function toggleSettings() {
  document.getElementById('settingsPanel').classList.toggle('open');
}

function saveSettings() {
  CONF.ci = document.getElementById('clientIdInput').value.trim();
  CONF.ak = document.getElementById('apiKeyInput').value.trim();
  safeSave('study_conf', CONF);
  showToast('✅ Keys saved!');
  setTimeout(() => location.reload(), 800);
}

function clearFilesOnly() {
  if (!confirm('Clear synced files? Keys will be kept.')) return;
  localStorage.removeItem('study_files');
  FILES = [];
  showToast('🗑 Cache cleared');
  setTimeout(() => location.reload(), 600);
}

// ===== GOOGLE INIT =====
window.addEventListener('load', () => {
  applyTheme();

  // Populate settings fields
  document.getElementById('clientIdInput').value = CONF.ci;
  document.getElementById('apiKeyInput').value   = CONF.ak;

  updateCounter();
  renderUI();

  // Init gapi
  if (CONF.ak) {
    gapi.load('client', async () => {
      await gapi.client.init({
        apiKey: CONF.ak,
        discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest']
      });
      // Try silent sign-in
      if (CONF.ci) initTokenClient(true);
    });
  }
});

function initTokenClient(silent = false) {
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CONF.ci,
    scope: 'https://www.googleapis.com/auth/drive.readonly',
    callback: (resp) => {
      if (resp.error) { showToast('⚠️ Sign-in failed', true); return; }
      accToken = resp.access_token;
      scheduleTokenRefresh(resp.expires_in || 3600);
      const btn = document.getElementById('authBtn');
      btn.textContent = 'Connected ✓';
      btn.classList.add('connected');
      renderUI();
    }
  });
  tokenClient.requestAccessToken({ prompt: silent ? 'none' : '' });
}

function handleAuthClick() {
  if (!CONF.ci || !CONF.ak) {
    toggleSettings();
    showToast('⚠️ Enter your API keys first!', true);
    return;
  }
  initTokenClient(false);
}

// Token auto-refresh (30s before expiry)
function scheduleTokenRefresh(expiresIn) {
  if (tokenTimer) clearTimeout(tokenTimer);
  const delay = Math.max((expiresIn - 30) * 1000, 10000);
  tokenTimer = setTimeout(() => {
    if (tokenClient) tokenClient.requestAccessToken({ prompt: 'none' });
  }, delay);
}

// ===== SCANNING =====
async function startScanning() {
  if (isScanning) return;
  const raw = document.getElementById('folderIdInput').value.trim();
  if (!raw) { showToast('⚠️ Paste a folder link or ID', true); return; }
  if (!accToken) { showToast('⚠️ Connect Google Drive first', true); return; }

  const id = extractFolderId(raw);
  if (!id) { showToast('⚠️ Invalid folder link', true); return; }

  isScanning = true;
  FILES = [];
  setSyncState(true);
  showProgress(true);

  try {
    await scanFolder(id);
    safeSave('study_files', FILES);
    updateCounter();
    sY='all'; sS='all'; sC='all';
    renderUI();
    showToast(`✅ ${FILES.length} files synced!`);
  } catch(err) {
    showToast('❌ Scan failed: ' + err.message, true);
    console.error(err);
  } finally {
    isScanning = false;
    setSyncState(false);
    showProgress(false);
  }
}

function extractFolderId(raw) {
  if (raw.includes('drive.google.com')) {
    const m = raw.match(/[-\w]{25,}/);
    return m ? m[0] : null;
  }
  return raw.match(/^[-\w]{25,}$/) ? raw : null;
}

function setSyncState(loading) {
  const btn = document.getElementById('syncBtn');
  const label = document.getElementById('syncBtnLabel');
  if (loading) {
    btn.classList.add('syncing');
    label.innerHTML = '<span class="spinning">↻</span>';
  } else {
    btn.classList.remove('syncing');
    label.textContent = 'Sync';
  }
}

function showProgress(show) {
  document.getElementById('progressBar').style.display = show ? 'block' : 'none';
  if (!show) document.getElementById('progressFill').style.width = '0%';
}

function updateProgress() {
  const fill = document.getElementById('progressFill');
  const pct = Math.min(FILES.length * 2, 90);
  fill.style.width = pct + '%';
}

async function scanFolder(folderId, pathParts = []) {
  let pageToken = null;
  do {
    const params = {
      q: `'${folderId}' in parents and trashed = false`,
      fields: 'nextPageToken, files(id,name,mimeType,webViewLink,iconLink)',
      pageSize: 200
    };
    if (pageToken) params.pageToken = pageToken;

    const resp = await gapi.client.drive.files.list(params);
    const items = resp.result.files || [];
    pageToken = resp.result.nextPageToken || null;

    for (const item of items) {
      if (item.mimeType === 'application/vnd.google-apps.folder') {
        await scanFolder(item.id, [...pathParts, item.name]);
      } else {
        const parts = pathParts;
        item.year     = detectYear(parts) || parts[0] || 'Unsorted';
        item.subject  = parts[parts.indexOf(item.year) + 1] || parts[1] || 'General';
        item.category = parts[parts.length - 1] || 'Files';
        // Avoid subject === year
        if (item.subject === item.year) item.subject = parts[2] || 'General';
        FILES.push(item);
        updateCounter();
        updateProgress();
      }
    }
  } while (pageToken);
}

function detectYear(parts) {
  return parts.find(p => /(spring|fall|summer|winter)\s?\d{2,4}/i.test(p) || /^\d{4}$/.test(p) || /\d{2}[-_]\d{2}/.test(p));
}

function updateCounter() {
  document.getElementById('fileCounter').textContent = `${FILES.length} files`;
  document.getElementById('starCount').textContent = STARS.length;
}

// ===== VIEWS =====
function switchView(v) {
  VIEW = v;
  document.getElementById('browseView').style.display  = v === 'browse'  ? 'block' : 'none';
  document.getElementById('starredView').style.display = v === 'starred' ? 'block' : 'none';
  document.getElementById('vt-browse').classList.toggle('active', v === 'browse');
  document.getElementById('vt-starred').classList.toggle('active', v === 'starred');
  if (v === 'starred') renderStarred();
}

// ===== RENDER UI (Tabs) =====
function renderUI() {
  renderTabs();
  renderFiles();
  renderPins();
  updateCounter();
}

function renderTabs() {
  // Year tabs
  const years = ['all', ...new Set(FILES.map(f => f.year))].filter(Boolean);
  document.getElementById('yearTabs').innerHTML = years.map(y =>
    `<button class="tab-btn${sY===y?' active':''}" onclick="selectYear('${y}')">${y.toUpperCase()}</button>`
  ).join('');

  // Subject tabs
  const yFiles = sY === 'all' ? FILES : FILES.filter(f => f.year === sY);
  const subs = ['all', ...new Set(yFiles.map(f => f.subject))].filter(Boolean);
  document.getElementById('subjectSection').classList.toggle('hidden-section', sY === 'all');
  document.getElementById('subjectTabs').innerHTML = subs.map(s =>
    `<button class="tab-btn${sS===s?' active':''}" onclick="selectSubject('${esc(s)}')">${s.toUpperCase()}</button>`
  ).join('');

  // Category tabs
  const sFiles = sS === 'all' ? yFiles : yFiles.filter(f => f.subject === sS);
  const cats = ['all', ...new Set(sFiles.map(f => f.category))].filter(Boolean);
  document.getElementById('categorySection').classList.toggle('hidden-section', sS === 'all');
  document.getElementById('typeTabs').innerHTML = cats.map(c =>
    `<button class="tab-btn${sC===c?' active':''}" onclick="selectCategory('${esc(c)}')">${c.toUpperCase()}</button>`
  ).join('');

  // Pin button state
  updatePinBtn();
}

function selectYear(y)    { sY=y; sS='all'; sC='all'; renderUI(); }
function selectSubject(s) { sS=s; sC='all'; renderUI(); }
function selectCategory(c){ sC=c; renderUI(); }

// ===== RENDER FILES =====
function renderFiles() {
  const q = (document.getElementById('searchBar').value || '').toLowerCase();
  const yFiles = sY==='all' ? FILES : FILES.filter(f=>f.year===sY);
  const sFiles = sS==='all' ? yFiles : yFiles.filter(f=>f.subject===sS);
  const cFiles = sC==='all' ? sFiles : sFiles.filter(f=>f.category===sC);
  const final  = cFiles.filter(f => f.name.toLowerCase().includes(q));

  const grid = document.getElementById('fileGrid');
  if (final.length === 0) {
    grid.innerHTML = `<div class="empty-state"><div class="empty-icon">${FILES.length===0?'☁️':'🔍'}</div><div class="empty-text">${FILES.length===0?'Sync a Drive folder to get started':'No files match your search'}</div></div>`;
    return;
  }
  grid.innerHTML = final.map(f => fileCardHTML(f)).join('');
}

function renderStarred() {
  const starred = FILES.filter(f => STARS.includes(f.id));
  const grid = document.getElementById('starredGrid');
  if (starred.length === 0) {
    grid.innerHTML = `<div class="empty-state"><div class="empty-icon">⭐</div><div class="empty-text">No starred files yet. Tap ★ on any file.</div></div>`;
    return;
  }
  grid.innerHTML = starred.map(f => fileCardHTML(f)).join('');
}

function fileCardHTML(f) {
  const isStarred = STARS.includes(f.id);
  const fid = f.id.replace(/['"]/g,'');
  return `<div class="file-card" onclick="openFile('${fid}')">
    ${f.iconLink ? `<img class="file-icon" src="${f.iconLink}" alt="" onerror="this.style.display='none'">` : '<div class="file-icon" style="font-size:1.2rem">📄</div>'}
    <div class="file-info">
      <div class="file-name">${escHTML(f.name)}</div>
      <div class="file-meta">${escHTML(f.year)} · ${escHTML(f.category)}</div>
    </div>
    <button class="star-btn${isStarred?' starred':''}" onclick="toggleStar(event,'${fid}')" title="Star">★</button>
  </div>`;
}

// ===== ACTIONS =====
function openFile(id) {
  const f = FILES.find(x=>x.id===id);
  if (f && f.webViewLink) window.open(f.webViewLink, '_blank');
}

function toggleStar(e, id) {
  e.stopPropagation();
  const idx = STARS.indexOf(id);
  if (idx !== -1) STARS.splice(idx, 1);
  else STARS.push(id);
  safeSave('study_stars', STARS);
  updateCounter();
  renderFiles();
  if (VIEW === 'starred') renderStarred();
}

// ===== PIN / QUICK ACCESS =====
function updatePinBtn() {
  const btn = document.getElementById('pinBtn');
  if (sY==='all' || sS==='all') {
    btn.textContent = '★ Pin Path';
    btn.classList.remove('bookmarked');
    return;
  }
  const pinned = PINS.some(p=>p.year===sY && p.sub===sS);
  btn.textContent = pinned ? '★ Pinned' : '★ Pin Path';
  btn.classList.toggle('bookmarked', pinned);
}

function toggleNavPin() {
  if (sY==='all' || sS==='all') { showToast('Select a Year and Subject first', true); return; }
  const idx = PINS.findIndex(p=>p.year===sY && p.sub===sS);
  if (idx !== -1) {
    PINS.splice(idx, 1);
    showToast('📍 Pin removed');
  } else {
    PINS.push({year:sY, sub:sS, label:`${sY} › ${sS}`});
    showToast('📍 Path pinned!');
  }
  safeSave('study_pins', PINS);
  updatePinBtn();
  renderPins();
}

function renderPins() {
  const sec = document.getElementById('quickAccessSection');
  if (PINS.length === 0) { sec.style.display='none'; return; }
  sec.style.display = 'block';
  document.getElementById('quickAccessGrid').innerHTML = PINS.map((p,i) =>
    `<div class="quick-chip" onclick="selectYear('${esc(p.year)}');selectSubject('${esc(p.sub)}')">
      📍 ${escHTML(p.label)}
      <span class="remove-pin" onclick="removePin(event,${i})">✕</span>
    </div>`
  ).join('');
}

function removePin(e, i) {
  e.stopPropagation();
  PINS.splice(i, 1);
  safeSave('study_pins', PINS);
  renderPins();
}

// ===== HELPERS =====
function esc(s) { return (s||'').replace(/'/g,"\\'"); }
function escHTML(s) {
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

// ===== TOAST =====
let toastTimer;
function showToast(msg, isError=false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (isError?' error':'');
  void t.offsetWidth;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove('show'), 2800);
}
</script>
