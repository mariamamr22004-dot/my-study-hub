<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>StudyHub AI - Professional</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://apis.google.com/js/api.js" async defer></script>
<style>
/* ===== THEME VARIABLES ===== */
:root {
  --bg: #0b0a12;
  --bg2: #13111f;
  --surface: rgba(30,28,45,0.95);
  --border: rgba(255,255,255,0.07);
  --text: #ffffff;
  --text-muted: #6b6880;
  --accent: #7c6ff7;
  --accent-glow: rgba(124,111,247,0.25);
  --star: #f9ca24;
  --danger: #ff6b6b;
  --success: #43e97b;
  --input-bg: rgba(0,0,0,0.3);
}
[data-theme="light"] {
  --bg: #f0effe;
  --bg2: #e8e5fd;
  --surface: rgba(255,255,255,0.85);
  --border: rgba(0,0,0,0.08);
  --text: #1a1828;
  --text-muted: #8b88a0;
  --input-bg: rgba(255,255,255,0.6);
}

/* ===== BASE STYLES ===== */
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  font-family: 'Poppins', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  transition: all 0.3s ease;
  overflow-x: hidden;
}

/* Background Animated Blobs */
.blobs { position: fixed; inset: 0; pointer-events: none; z-index: -1; }
.blob { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.15; }

/* ===== LAYOUT ===== */
.glass { background: var(--surface); border: 1px solid var(--border); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-radius: 20px; }

.nav { position: sticky; top: 0; z-index: 200; margin: 12px; padding: 14px 18px; display: flex; align-items: center; justify-content: space-between; }
.nav-logo { font-size: 1.1rem; font-weight: 900; letter-spacing: -0.5px; }
.nav-logo span { color: var(--accent); }

.main-container { padding: 12px; max-width: 720px; margin: 0 auto; }

/* ===== SYNC & SEARCH ===== */
.sync-card { padding: 18px; margin-bottom: 16px; }
.inp { width: 100%; background: var(--input-bg); border: 1.5px solid var(--border); border-radius: 14px; padding: 12px 14px; font-size: 0.8rem; color: var(--text); outline: none; transition: border 0.2s; }
.inp:focus { border-color: var(--accent); }

.sync-btn {
  background: var(--text); color: var(--bg); border: none; border-radius: 14px;
  font-weight: 900; font-size: 0.7rem; padding: 0 20px; cursor: pointer;
  transition: all 0.2s; display: flex; flex-direction: column; align-items: center; justify-content: center;
}
.sync-btn.syncing { background: var(--accent); color: white; opacity: 0.8; }

/* ===== FILE CARDS (CRITICAL FIX) ===== */
.file-card {
  display: flex; align-items: center; gap: 12px; padding: 14px; margin-bottom: 10px;
  border-radius: 18px; background: var(--input-bg); border: 1px solid var(--border);
  transition: all 0.2s; cursor: pointer; position: relative; overflow: hidden;
}
.file-card:hover { border-color: var(--accent); transform: translateY(-2px); }

.file-info { flex: 1; min-width: 0; }
.file-name { font-size: 0.85rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.file-meta { font-size: 0.6rem; color: var(--text-muted); text-transform: uppercase; margin-top: 2px; }

.star-btn {
  flex-shrink: 0; /* Prevents disappearing */
  width: 40px; height: 40px; border: none; background: none;
  font-size: 1.2rem; cursor: pointer; color: var(--text-muted);
  display: flex; align-items: center; justify-content: center;
  margin-left: auto; /* Always right */
  transition: color 0.2s;
}
.star-btn.starred { color: var(--star); }

/* ===== TABS & NAVIGATION ===== */
.tabs-scroll { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 8px; scrollbar-width: none; }
.tabs-scroll::-webkit-scrollbar { display: none; }
.tab-btn {
  background: var(--input-bg); border: 1.5px solid var(--border); border-radius: 30px;
  color: var(--text-muted); font-size: 0.65rem; font-weight: 700; padding: 8px 16px;
  white-space: nowrap; cursor: pointer; transition: all 0.2s;
}
.tab-btn.active { background: var(--accent); border-color: var(--accent); color: white; }

.sec-label { font-size: 0.6rem; font-weight: 900; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 8px; display: block; }

/* ===== SETTINGS ===== */
.settings-panel { margin: 8px 12px; padding: 20px; display: none; }
.settings-panel.open { display: block; animation: slideDown 0.3s ease; }
@keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

/* ===== UTILS ===== */
.spinning { display: inline-block; animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* No side scroll fix */
html, body { max-width: 100vw; overflow-x: hidden; }
</style>
</head>
<body>

<div class="blobs">
  <div class="blob" style="width: 300px; height: 300px; background: var(--accent); top: -100px; left: -100px;"></div>
  <div class="blob" style="width: 250px; height: 250px; background: var(--success); bottom: -50px; right: -50px;"></div>
</div>

<nav class="glass nav">
  <div class="nav-logo" onclick="location.reload()" style="cursor:pointer">StudyHub <span>AI</span></div>
  <div style="display:flex; gap:8px;">
    <button class="tab-btn" onclick="toggleTheme()" id="themeIcon">🌙</button>
    <button class="tab-btn" onclick="toggleSettings()">⚙️</button>
    <button class="tab-btn active" id="authBtn" onclick="handleAuth()">Connect</button>
  </div>
</nav>

<div class="glass settings-panel" id="settingsPanel">
  <span class="sec-label">Google API Config</span>
  <input class="inp mb-2" id="clientId" type="text" placeholder="Client ID">
  <input class="inp mb-3" id="apiKey" type="password" placeholder="API Key">
  <button class="tab-btn active w-full" onclick="saveSettings()">Save & Reload</button>
  <button class="tab-btn w-full mt-2" style="color:var(--danger)" onclick="wipeCache()">Wipe Files Cache</button>
</div>

<div class="main-container">
  <div class="glass sync-card">
    <div style="display:flex; gap:10px; margin-bottom:12px;">
      <input class="inp" id="driveUrl" type="text" placeholder="Paste Google Drive Folder Link...">
      <button class="sync-btn" id="syncBtn" onclick="syncDrive()">
        <span id="syncText">Sync</span>
        <span id="fileCount" style="font-size:0.5rem; opacity:0.6">0 files</span>
      </button>
    </div>
    <input class="inp" id="searchBar" type="text" placeholder="Search in cache..." oninput="renderFiles()">
  </div>

  <div id="browseSection">
    <div class="mb-4" id="yearContainer">
      <span class="sec-label">Step 1: Year</span>
      <div class="tabs-scroll" id="yearTabs"></div>
    </div>
    <div class="mb-4 hidden" id="subjectContainer">
      <span class="sec-label">Step 2: Subject</span>
      <div class="tabs-scroll" id="subjectTabs"></div>
    </div>
    <div class="mb-4 hidden" id="catContainer">
      <span class="sec-label">Step 3: Category</span>
      <div class="tabs-scroll" id="catTabs"></div>
    </div>
    
    <div style="display:flex; justify-content: space-between; align-items:center; margin-top:20px;">
      <span class="sec-label" id="gridTitle">Files</span>
      <button class="tab-btn" id="starFilterBtn" onclick="toggleStarFilter()">⭐ Show Favorites</button>
    </div>
    <div id="fileGrid" style="margin-top:10px; padding-bottom:100px;"></div>
  </div>
</div>

<script>
// --- STATE MANAGEMENT ---
let STATE = {
  conf: JSON.parse(localStorage.getItem('sh_conf')) || { ci: '', ak: '' },
  files: JSON.parse(localStorage.getItem('sh_files')) || [],
  stars: JSON.parse(localStorage.getItem('sh_stars')) || [],
  theme: localStorage.getItem('sh_theme') || 'dark',
  filter: { y: 'all', s: 'all', c: 'all', q: '', starsOnly: false },
  token: null,
  isSyncing: false
};

// --- INITIALIZATION ---
window.onload = () => {
  applyTheme();
  document.getElementById('clientId').value = STATE.conf.ci;
  document.getElementById('apiKey').value = STATE.conf.ak;
  updateCounter();
  
  if(STATE.conf.ak) {
    gapi.load('client', async () => {
      await gapi.client.init({ apiKey: STATE.conf.ak, discoveryDocs: ["https://www.googleapis.com/discovery/v1/apis/drive/v3/rest"] });
      if(STATE.conf.ci) initGIS();
    });
  }
  renderUI();
};

function initGIS() {
  const client = google.accounts.oauth2.initTokenClient({
    client_id: STATE.conf.ci,
    scope: 'https://www.googleapis.com/auth/drive.readonly',
    callback: (res) => {
      STATE.token = res.access_token;
      document.getElementById('authBtn').innerText = 'Connected ✓';
      document.getElementById('authBtn').style.background = 'var(--success)';
    }
  });
  STATE.gis = client;
}

function handleAuth() { STATE.gis ? STATE.gis.requestAccessToken() : toggleSettings(); }

// --- SYNC CORE (FIXED HIERARCHY) ---
async function syncDrive() {
  if(STATE.isSyncing || !STATE.token) return alert("Connect Drive First!");
  
  const folderUrl = document.getElementById('driveUrl').value;
  const folderId = folderUrl.match(/[-\w]{25,}/);
  if(!folderId) return alert("Invalid Folder ID/Link");

  STATE.isSyncing = true;
  STATE.files = [];
  updateSyncBtn(true);

  try {
    await scanRecursive(folderId[0], []);
    localStorage.setItem('sh_files', JSON.stringify(STATE.files));
    alert(`Success! Found ${STATE.files.length} files.`);
  } catch (e) {
    console.error(e);
    alert("Sync Error. Check API keys.");
  } finally {
    STATE.isSyncing = false;
    updateSyncBtn(false);
    renderUI();
  }
}

async function scanRecursive(id, pathArray) {
  let pageToken;
  do {
    const res = await gapi.client.drive.files.list({
      q: `'${id}' in parents and trashed = false`,
      fields: 'nextPageToken, files(id, name, mimeType, webViewLink, iconLink)',
      pageSize: 1000,
      pageToken
    });
    
    const items = res.result.files;
    for (const item of items) {
      if (item.mimeType === 'application/vnd.google-apps.folder') {
        // Build hierarchy based on folder nesting
        await scanRecursive(item.id, [...pathArray, item.name]);
      } else {
        STATE.files.push({
          id: item.id,
          name: item.name,
          link: item.webViewLink,
          icon: item.iconLink,
          year: pathArray[0] || 'Unsorted',
          subject: pathArray[1] || 'General',
          category: pathArray[2] || 'Files'
        });
      }
    }
    pageToken = res.result.nextPageToken;
  } while (pageToken);
}

// --- UI RENDERING ---
function renderUI() {
  renderTabs('yearTabs', [...new Set(STATE.files.map(f => f.year))], 'y');
  
  const subjects = STATE.filter.y === 'all' ? [] : [...new Set(STATE.files.filter(f => f.year === STATE.filter.y).map(f => f.subject))];
  document.getElementById('subjectContainer').classList.toggle('hidden', subjects.length === 0);
  renderTabs('subjectTabs', subjects, 's');

  const cats = STATE.filter.s === 'all' ? [] : [...new Set(STATE.files.filter(f => f.subject === STATE.filter.s).map(f => f.category))];
  document.getElementById('catContainer').classList.toggle('hidden', cats.length === 0);
  renderTabs('catTabs', cats, 'c');

  renderFiles();
  updateCounter();
}

function renderTabs(containerId, items, filterKey) {
  const container = document.getElementById(containerId);
  container.innerHTML = ''; // SANITIZATION
  
  if (items.length === 0) return;

  const allBtn = document.createElement('button');
  allBtn.className = `tab-btn ${STATE.filter[filterKey] === 'all' ? 'active' : ''}`;
  allBtn.innerText = 'ALL';
  allBtn.onclick = () => { STATE.filter[filterKey] = 'all'; renderUI(); };
  container.appendChild(allBtn);

  items.forEach(item => {
    const btn = document.createElement('button');
    btn.className = `tab-btn ${STATE.filter[filterKey] === item ? 'active' : ''}`;
    btn.innerText = item.toUpperCase();
    btn.onclick = () => { STATE.filter[filterKey] = item; renderUI(); };
    container.appendChild(btn);
  });
}

function renderFiles() {
  const grid = document.getElementById('fileGrid');
  grid.innerHTML = ''; // SANITIZATION
  
  const query = document.getElementById('searchBar').value.toLowerCase();
  
  const filtered = STATE.files.filter(f => {
    const matchY = STATE.filter.y === 'all' || f.year === STATE.filter.y;
    const matchS = STATE.filter.s === 'all' || f.subject === STATE.filter.s;
    const matchC = STATE.filter.c === 'all' || f.category === STATE.filter.c;
    const matchQ = f.name.toLowerCase().includes(query);
    const matchStar = !STATE.filter.starsOnly || STATE.stars.includes(f.id);
    return matchY && matchS && matchC && matchQ && matchStar;
  });

  if(filtered.length === 0) {
    grid.innerHTML = `<div style="text-align:center; opacity:0.5; padding:50px;">No files found. Try syncing.</div>`;
    return;
  }

  filtered.forEach(f => {
    const isStarred = STATE.stars.includes(f.id);
    const card = document.createElement('div');
    card.className = 'glass file-card';
    card.innerHTML = `
      <img src="${f.icon}" style="width:24px; opacity:0.8">
      <div class="file-info" onclick="window.open('${f.link}', '_blank')">
        <div class="file-name">${f.name}</div>
        <div class="file-meta">${f.year} • ${f.category}</div>
      </div>
      <button class="star-btn ${isStarred ? 'starred' : ''}" onclick="toggleStar('${f.id}')">★</button>
    `;
    grid.appendChild(card);
  });
}

// --- LOGIC HELPERS ---
function toggleStar(id) {
  const index = STATE.stars.indexOf(id);
  index > -1 ? STATE.stars.splice(index, 1) : STATE.stars.push(id);
  localStorage.setItem('sh_stars', JSON.stringify(STATE.stars));
  renderFiles();
}

function toggleStarFilter() {
  STATE.filter.starsOnly = !STATE.filter.starsOnly;
  document.getElementById('starFilterBtn').classList.toggle('active');
  renderFiles();
}

function updateCounter() { document.getElementById('fileCount').innerText = `${STATE.files.length} files`; }

function updateSyncBtn(loading) {
  const btn = document.getElementById('syncBtn');
  document.getElementById('syncText').innerHTML = loading ? '<span class="spinning">↻</span>' : 'Sync';
  btn.classList.toggle('syncing', loading);
}

function saveSettings() {
  STATE.conf.ci = document.getElementById('clientId').value;
  STATE.conf.ak = document.getElementById('apiKey').value;
  localStorage.setItem('sh_conf', JSON.stringify(STATE.conf));
  location.reload();
}

function toggleSettings() { document.getElementById('settingsPanel').classList.toggle('open'); }

function wipeCache() { localStorage.removeItem('sh_files'); location.reload(); }

function toggleTheme() {
  STATE.theme = STATE.theme === 'dark' ? 'light' : 'dark';
  localStorage.setItem('sh_theme', STATE.theme);
  applyTheme();
}

function applyTheme() {
  document.documentElement.setAttribute('data-theme', STATE.theme);
  document.getElementById('themeIcon').innerText = STATE.theme === 'dark' ? '🌙' : '☀️';
}
</script>
</body>
                                             </html>
