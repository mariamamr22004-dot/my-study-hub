<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyHub AI - Smart Logic</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js" async defer></script>
    <style>
        :root { --accent: #7c6ff7; --bg: #0f0e17; --surface: #1a1828; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: white; }
        .glass { background: rgba(26, 24, 40, 0.9); backdrop-filter: blur(10px); border: 1px solid #2e2b45; }
        .active-tab { background: var(--accent) !important; color: white !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="min-h-screen pb-10">

    <nav class="glass sticky top-0 z-50 p-4 flex justify-between items-center">
        <h1 class="text-xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-blue-400">🎓 StudyHub AI</h1>
        <div class="flex gap-2">
            <button onclick="toggleSettings()" class="bg-gray-800 p-2 rounded-lg text-xs">⚙️ Settings</button>
            <button id="authBtn" onclick="handleAuthClick()" class="bg-purple-600 px-4 py-1 rounded-lg text-sm font-semibold">Connect</button>
        </div>
    </nav>

    <div id="settingsPanel" class="glass m-6 p-6 rounded-2xl hidden border-yellow-500/30">
        <h2 class="text-xs font-bold mb-4 text-yellow-500">API Configuration</h2>
        <div class="grid gap-3">
            <input type="text" id="clientIdInput" placeholder="Client ID" class="w-full bg-black/50 border border-gray-700 p-2 rounded-lg text-xs outline-none">
            <input type="password" id="apiKeyInput" placeholder="API Key" class="w-full bg-black/50 border border-gray-700 p-2 rounded-lg text-xs outline-none">
            <button onclick="saveSettings()" class="bg-yellow-600 text-white text-xs p-2 rounded-lg font-bold">Save & Reload</button>
        </div>
    </div>

    <main class="container mx-auto p-4 max-w-4xl">
        <div class="glass rounded-2xl p-6 mb-6">
            <div class="flex flex-col gap-3">
                <input type="text" id="folderIdInput" placeholder="Paste Folder Link or ID" 
                       class="w-full bg-[#0f0e17] border border-[#2e2b45] p-3 rounded-xl outline-none focus:border-purple-500 text-sm">
                <button onclick="startScanning()" class="bg-green-500 text-black font-bold p-3 rounded-xl hover:bg-green-400 transition text-sm">Sync Drive Now</button>
            </div>
            <p id="statusMsg" class="text-[10px] mt-2 text-gray-500 text-center uppercase tracking-widest"></p>
        </div>

        <div class="mb-6 space-y-4">
            <div>
                <p class="text-[10px] text-gray-500 mb-2 uppercase font-bold">Categories</p>
                <div id="categoryTabs" class="flex gap-2 overflow-x-auto no-scrollbar pb-2"></div>
            </div>
            <div>
                <p class="text-[10px] text-gray-500 mb-2 uppercase font-bold">Subjects / Semesters</p>
                <div id="subjectTabs" class="flex gap-2 overflow-x-auto no-scrollbar pb-2"></div>
            </div>
        </div>

        <div id="fileGrid" class="grid gap-3"></div>
    </main>

    <script>
        let CONFIG = JSON.parse(localStorage.getItem('studyHub_Config')) || { clientId: '', apiKey: '' };
        let allFiles = JSON.parse(localStorage.getItem('studyHub_Files')) || [];
        let tokenClient;
        let selectedCategory = 'all';
        let selectedSubject = 'all';

        // Enhanced AI Mapping
        const keywords = {
            final: ['final', 'فاينل'],
            solution: ['solution', 'sol', 'حل', 'answer'],
            quiz: ['quiz', 'test', 'exam'],
            summary: ['summary', 'sum', 'ملخص', 'notes'],
            lab: ['lab', 'لاب', 'practical']
        };

        function gapiLoaded() { 
            if(CONFIG.apiKey) gapi.load('client', () => { 
                gapi.client.init({ apiKey: CONFIG.apiKey, discoveryDocs: ["https://www.googleapis.com/discovery/v1/apis/drive/v3/rest"] });
            });
        }

        function gisLoaded() { 
            if(CONFIG.clientId) tokenClient = google.accounts.oauth2.initTokenClient({ 
                client_id: CONFIG.clientId, 
                scope: 'https://www.googleapis.com/auth/drive.readonly',
                callback: (tokenResponse) => {
                    localStorage.setItem('gdrive_token', JSON.stringify(tokenResponse));
                    document.getElementById('authBtn').innerText = "Live ✅";
                }
            });
        }

        window.onload = () => {
            document.getElementById('clientIdInput').value = CONFIG.clientId;
            document.getElementById('apiKeyInput').value = CONFIG.apiKey;
            gapiLoaded(); gisLoaded(); 
            // Check if token exists to avoid re-connect
            if(localStorage.getItem('gdrive_token')) document.getElementById('authBtn').innerText = "Live ✅";
            renderUI(); 
        };

        function saveSettings() {
            CONFIG.clientId = document.getElementById('clientIdInput').value.trim();
            CONFIG.apiKey = document.getElementById('apiKeyInput').value.trim();
            localStorage.setItem('studyHub_Config', JSON.stringify(CONFIG));
            location.reload();
        }

        function toggleSettings() { document.getElementById('settingsPanel').classList.toggle('hidden'); }

        function handleAuthClick() { tokenClient.requestAccessToken({ prompt: '' }); } // prompt empty avoids re-asking

        async function startScanning() {
            const input = document.getElementById('folderIdInput').value;
            const folderId = input.includes('id=') ? input.split('id=')[1] : (input.includes('/') ? input.split('/').pop() : input);
            if (!folderId) return alert("Enter ID");
            updateStatus("AI Analyzing Folders...");
            allFiles = [];
            await scanFolder(folderId);
            localStorage.setItem('studyHub_Files', JSON.stringify(allFiles));
            renderUI();
            updateStatus("Scan Finished!");
        }

        async function scanFolder(folderId, path = "") {
            const response = await gapi.client.drive.files.list({
                q: `'${folderId}' in parents and trashed = false`,
                fields: 'files(id, name, mimeType, webViewLink, iconLink)',
            });
            for (let file of response.result.files) {
                if (file.mimeType === 'application/vnd.google-apps.folder') {
                    await scanFolder(file.id, path + file.name + " / ");
                } else {
                    file.fullPath = path + file.name;
                    file.category = smartDetect(file.name, path);
                    file.subject = extractSubject(path);
                    allFiles.push(file);
                }
            }
        }

        function smartDetect(fileName, path) {
            const full = (fileName + " " + path).toLowerCase();
            if (full.includes('solution') || full.includes('sol') || full.includes('حل')) return 'solution';
            if (full.includes('final') || full.includes('فاينل')) return 'final';
            for (const [key, list] of Object.entries(keywords)) {
                if (list.some(word => full.includes(word))) return key;
            }
            return 'other';
        }

        function extractSubject(path) {
            const parts = path.split(' / ').filter(p => p.trim() !== "");
            // Returns the first folder name as Subject or Year if available
            return parts.length > 0 ? parts[0] : 'General';
        }

        function renderUI() {
            const cats = ['all', ...new Set(allFiles.map(f => f.category))];
            const subs = ['all', ...new Set(allFiles.map(f => f.subject))];

            document.getElementById('categoryTabs').innerHTML = cats.map(c => 
                `<button onclick="selectedCategory='${c}';renderUI()" class="px-4 py-1 rounded-full border border-gray-700 text-[10px] uppercase ${selectedCategory===c?'active-tab':''}">${c}</button>`
            ).join('');

            document.getElementById('subjectTabs').innerHTML = subs.map(s => 
                `<button onclick="selectedSubject='${s}';renderUI()" class="px-4 py-1 rounded-full border border-gray-700 text-[10px] ${selectedSubject===s?'active-tab':''}">${s}</button>`
            ).join('');

            const filtered = allFiles.filter(f => 
                (selectedCategory === 'all' || f.category === selectedCategory) &&
                (selectedSubject === 'all' || f.subject === selectedSubject)
            );

            document.getElementById('fileGrid').innerHTML = filtered.map(file => `
                <div class="glass p-3 rounded-xl flex justify-between items-center text-sm" onclick="window.open('${file.webViewLink}')">
                    <div class="truncate">
                        <p class="font-medium truncate">${file.name}</p>
                        <p class="text-[8px] text-gray-500 uppercase">${file.fullPath}</p>
                    </div>
                    <span class="text-[8px] p-1 px-2 rounded bg-purple-900/20 text-purple-400 border border-purple-800 ml-2 uppercase">${file.category}</span>
                </div>
            `).join('');
        }

        function updateStatus(msg) { document.getElementById('statusMsg').innerText = msg; }
    </script>
</body>
</html>

    <main class="container mx-auto p-6 max-w-4xl">
        <div class="glass rounded-2xl p-6 mb-6">
            <div class="flex flex-col gap-3">
                <input type="text" id="folderIdInput" placeholder="Paste Google Drive Folder Link or ID" 
                       class="w-full bg-[#0f0e17] border border-[#2e2b45] p-3 rounded-xl outline-none focus:border-purple-500">
                <button onclick="startScanning()" id="scanBtn" class="bg-green-500 text-black font-bold p-3 rounded-xl hover:bg-green-400">
                    Sync & Analyze
                </button>
            </div>
            <p id="statusMsg" class="text-[10px] mt-2 text-gray-400 text-center uppercase tracking-widest"></p>
        </div>

        <div id="categoryTabs" class="flex gap-2 overflow-x-auto pb-4 no-scrollbar">
            <button id="allTab" onclick="filterByCategory('all')" class="tab-btn active-tab border border-gray-700 px-4 py-1 rounded-full text-xs">All</button>
        </div>

        <div id="fileGrid" class="grid gap-3"></div>
    </main>

    <script>
        let CONFIG = JSON.parse(localStorage.getItem('studyHub_Config')) || { clientId: '', apiKey: '' };
        let allFiles = JSON.parse(localStorage.getItem('studyHub_Files')) || [];
        let tokenClient;
        let currentCategory = 'all';

        const categoryMap = {
            'quiz': ['quiz', 'test', 'exam', 'assessment'],
            'midterm': ['midterm', 'mid'],
            'final': ['final', 'last'],
            'summary': ['summary', 'sum', 'handout', 'notes', 'ملخص'],
            'lecture': ['lec', 'lecture', 'session', 'محاضرة'],
            'lab': ['lab', 'practical', 'لاب'],
            'sheet': ['sheet', 'assignment', 'homework', 'شيت', 'حل']
        };

        function gapiLoaded() { 
            if(CONFIG.apiKey) {
                gapi.load('client', () => { 
                    gapi.client.init({ apiKey: CONFIG.apiKey, discoveryDocs: ["https://www.googleapis.com/discovery/v1/apis/drive/v3/rest"] }); 
                });
            }
        }

        function gisLoaded() { 
            if(CONFIG.clientId) {
                tokenClient = google.accounts.oauth2.initTokenClient({ 
                    client_id: CONFIG.clientId, 
                    scope: 'https://www.googleapis.com/auth/drive.readonly', 
                    callback: (resp) => { if (resp.access_token) document.getElementById('authBtn').innerText = "Live ✅"; } 
                }); 
            }
        }

        window.onload = () => {
            document.getElementById('clientIdInput').value = CONFIG.clientId;
            document.getElementById('apiKeyInput').value = CONFIG.apiKey;
            gapiLoaded(); gisLoaded(); renderUI(); 
        };

        function saveSettings() {
            CONFIG.clientId = document.getElementById('clientIdInput').value.trim();
            CONFIG.apiKey = document.getElementById('apiKeyInput').value.trim();
            localStorage.setItem('studyHub_Config', JSON.stringify(CONFIG));
            alert("Settings saved! Reloading...");
            location.reload();
        }

        function toggleSettings() { document.getElementById('settingsPanel').classList.toggle('hidden'); }

        function handleAuthClick() { 
            if(!tokenClient) return alert("Please configure Client ID in settings first!");
            tokenClient.requestAccessToken({ prompt: 'consent' }); 
        }

        async function startScanning() {
            const input = document.getElementById('folderIdInput').value;
            const folderId = input.includes('id=') ? input.split('id=')[1] : (input.includes('/') ? input.split('/').pop() : input);
            if (!folderId) return alert("Invalid ID");
            
            updateStatus("Scanning...");
            allFiles = [];
            await scanFolder(folderId);
            localStorage.setItem('studyHub_Files', JSON.stringify(allFiles));
            renderUI();
            updateStatus("Sync Complete!");
        }

        async function scanFolder(folderId, path = "") {
            try {
                const response = await gapi.client.drive.files.list({
                    q: `'${folderId}' in parents and trashed = false`,
                    fields: 'files(id, name, mimeType, webViewLink, iconLink)',
                });
                for (let file of response.result.files) {
                    if (file.mimeType === 'application/vnd.google-apps.folder') {
                        await scanFolder(file.id, path + file.name + " / ");
                    } else {
                        file.category = detectCategory(file.name);
                        file.path = path;
                        allFiles.push(file);
                    }
                }
            } catch(e) { console.error(e); }
        }

        function detectCategory(name) {
            name = name.toLowerCase();
            for (const [cat, keywords] of Object.entries(categoryMap)) {
                if (keywords.some(key => name.includes(key))) return cat;
            }
            return 'other';
        }

        function renderUI() {
            renderTabs();
            renderFiles();
        }

        function renderTabs() {
            const container = document.getElementById('categoryTabs');
            const categories = [...new Set(allFiles.map(f => f.category))].filter(c => c !== 'other');
            let html = `<button onclick="filterByCategory('all')" class="tab-btn ${currentCategory === 'all' ? 'active-tab' : ''} border border-gray-700 px-4 py-1 rounded-full text-xs">All</button>`;
            categories.forEach(cat => {
                html += `<button onclick="filterByCategory('${cat}')" class="tab-btn ${currentCategory === cat ? 'active-tab' : ''} border border-gray-700 px-4 py-1 rounded-full text-xs uppercase">${cat}</button>`;
            });
            container.innerHTML = html;
        }

        function renderFiles() {
            const grid = document.getElementById('fileGrid');
            const filtered = currentCategory === 'all' ? allFiles : allFiles.filter(f => f.category === currentCategory);
            grid.innerHTML = filtered.map(file => `
                <div class="glass p-4 rounded-xl flex justify-between items-center hover:border-purple-500 transition cursor-pointer" onclick="window.open('${file.webViewLink}')">
                    <div class="flex items-center gap-3 overflow-hidden">
                        <img src="${file.iconLink}" class="w-4 h-4">
                        <div class="truncate">
                            <p class="text-sm font-semibold truncate">${file.name}</p>
                            <p class="text-[8px] text-gray-500 uppercase tracking-tighter">${file.path || 'Root'}</p>
                        </div>
                    </div>
                    <span class="text-[8px] px-2 py-1 rounded bg-purple-950/30 text-purple-400 border border-purple-800 uppercase ml-2">${file.category}</span>
                </div>
            `).join('');
        }

        function filterByCategory(cat) { currentCategory = cat; renderUI(); }
        function updateStatus(msg) { document.getElementById('statusMsg').innerText = msg; }
    </script>
</body>
</html>
