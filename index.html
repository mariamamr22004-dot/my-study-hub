<!DOCTYPE html>
<html lang="en">
<head>
<style>
/* ... (نفس الستايلات الأصلية) ... */

/* إضافة ستايل قائمة الخيارات (Context Menu) */
.context-menu {
  position: fixed;
  z-index: 1000;
  min-width: 150px;
  background: var(--surface);
  border: 1px solid var(--border);
  backdrop-filter: blur(25px);
  border-radius: 15px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  display: none;
  padding: 8px;
}
.menu-item {
  padding: 10px 15px;
  font-size: 0.8rem;
  border-radius: 10px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 10px;
  transition: background 0.2s;
}
.menu-item:hover { background: rgba(255,255,255,0.1); }
.menu-item.danger { color: var(--danger); }
</style>
</head>
<body>

<div id="contextMenu" class="context-menu">
    <div class="menu-item" onclick="handleMenuAction('pin')">📌 Pin / Unpin</div>
    <div class="menu-item" onclick="handleMenuAction('edit')">✏️ Edit Name</div>
    <div class="menu-item danger" onclick="handleMenuAction('delete')">🗑️ Delete Locally</div>
</div>

<script>
// تحديث الـ STATE ليشمل الأولويات
let STATE = {
  conf: JSON.parse(localStorage.getItem('sh_conf')) || { ci: '', ak: '' },
  files: JSON.parse(localStorage.getItem('sh_files')) || [],
  stars: JSON.parse(localStorage.getItem('sh_stars')) || [],
  pins: JSON.parse(localStorage.getItem('sh_pins')) || [], // ميزة التثبيت
  theme: localStorage.getItem('sh_theme') || 'dark',
  filter: { y: 'all', s: 'all', c: 'all', q: '', starsOnly: false },
  token: null,
  isSyncing: false,
  activeTarget: null // لتحديد العنصر المضغوط عليه مطولاً
};

// قائمة الأولويات للترتيب الذكي
const CATEGORY_PRIORITY = ["LECTURES", "SECTIONS", "SHEETS", "ASSIGNMENTS", "QUIZZES"];

// --- ميزة الضغط المطول (Long Press Logic) ---
let pressTimer;
function setupLongPress(element, data) {
    const start = (e) => {
        if (e.type === 'click' && e.button !== 0) return; 
        pressTimer = setTimeout(() => showContextMenu(e, data), 600);
    };
    const cancel = () => clearTimeout(pressTimer);

    element.addEventListener('mousedown', start);
    element.addEventListener('touchstart', start);
    element.addEventListener('mouseup', cancel);
    element.addEventListener('mouseleave', cancel);
    element.addEventListener('touchend', cancel);
    
    // منع القائمة الافتراضية للمتصفح
    element.addEventListener('contextmenu', (e) => {
        e.preventDefault();
        showContextMenu(e, data);
    });
}

function showContextMenu(e, data) {
    const menu = document.getElementById('contextMenu');
    STATE.activeTarget = data;
    
    const x = e.pageX || e.touches[0].pageX;
    const y = e.pageY || e.touches[0].pageY;
    
    menu.style.left = `${x}px`;
    menu.style.top = `${y}px`;
    menu.style.display = 'block';

    // إغلاق القائمة عند الضغط في أي مكان آخر
    document.addEventListener('click', () => menu.style.display = 'none', {once: true});
}

// --- معالجة إجراءات القائمة ---
function handleMenuAction(action) {
    const target = STATE.activeTarget;
    if (!target) return;

    if (action === 'delete') {
        if(confirm("Delete this from local view?")) {
            STATE.files = STATE.files.filter(f => f.id !== target.id);
            localStorage.setItem('sh_files', JSON.stringify(STATE.files));
        }
    } else if (action === 'pin') {
        const idx = STATE.pins.indexOf(target.id);
        idx > -1 ? STATE.pins.splice(idx, 1) : STATE.pins.push(target.id);
        localStorage.setItem('sh_pins', JSON.stringify(STATE.pins));
    } else if (action === 'edit') {
        const newName = prompt("Enter new name:", target.name);
        if (newName) {
            STATE.files.forEach(f => { if(f.id === target.id) f.name = newName; });
            localStorage.setItem('sh_files', JSON.stringify(STATE.files));
        }
    }
    renderUI();
}

// --- تحديث الـ Render ليشمل الترتيب الذكي والضغط المطول ---
function renderTabs(containerId, items, filterKey) {
  const container = document.getElementById(containerId);
  container.innerHTML = ''; 
  
  if (items.length === 0) return;

  // تطبيق الترتيب الذكي إذا كانت الفئة Category
  if (filterKey === 'c') {
      items.sort((a, b) => {
          let indexA = CATEGORY_PRIORITY.indexOf(a.toUpperCase());
          let indexB = CATEGORY_PRIORITY.indexOf(b.toUpperCase());
          if (indexA === -1) indexA = 99;
          if (indexB === -1) indexB = 99;
          return indexA - indexB;
      });
  }

  const allBtn = document.createElement('button');
  allBtn.className = `tab-btn ${STATE.filter[filterKey] === 'all' ? 'active' : ''}`;
  allBtn.innerText = 'ALL';
  allBtn.onclick = () => { STATE.filter[filterKey] = 'all'; renderUI(); };
  container.appendChild(allBtn);

  items.forEach(item => {
    const btn = document.createElement('button');
    btn.className = `tab-btn ${STATE.filter[filterKey] === item ? 'active' : ''}`;
    btn.innerText = item.toUpperCase();
    btn.onclick = () => { STATE.filter[filterKey] = item; renderUI(); };
    
    // إضافة ميزة الضغط المطول للتبويب
    setupLongPress(btn, { type: 'category', id: item, name: item });
    
    container.appendChild(btn);
  });
}

function renderFiles() {
  const grid = document.getElementById('fileGrid');
  grid.innerHTML = ''; 
  
  const query = document.getElementById('searchBar').value.toLowerCase();
  
  let filtered = STATE.files.filter(f => {
    const matchY = STATE.filter.y === 'all' || f.year === STATE.filter.y;
    const matchS = STATE.filter.s === 'all' || f.subject === STATE.filter.s;
    const matchC = STATE.filter.c === 'all' || f.category === STATE.filter.c;
    const matchQ = f.name.toLowerCase().includes(query);
    const matchStar = !STATE.filter.starsOnly || STATE.stars.includes(f.id);
    return matchY && matchS && matchC && matchQ && matchStar;
  });

  // وضع الملفات المثبتة (Pinned) في البداية
  filtered.sort((a, b) => {
      const aPinned = STATE.pins.includes(a.id) ? 1 : 0;
      const bPinned = STATE.pins.includes(b.id) ? 1 : 0;
      return bPinned - aPinned;
  });

  if(filtered.length === 0) {
    grid.innerHTML = `<div style="text-align:center; opacity:0.5; padding:50px;">No files found.</div>`;
    return;
  }

  filtered.forEach(f => {
    const isStarred = STATE.stars.includes(f.id);
    const isPinned = STATE.pins.includes(f.id);
    const card = document.createElement('div');
    card.className = 'glass file-card';
    if(isPinned) card.style.borderColor = 'var(--accent)';

    card.innerHTML = `
      <img src="${f.icon}" style="width:24px; opacity:0.8">
      <div class="file-info" onclick="window.open('${f.link}', '_blank')">
        <div class="file-name">${isPinned ? '📌 ' : ''}${f.name}</div>
        <div class="file-meta">${f.year} • ${f.category}</div>
      </div>
      <button class="star-btn ${isStarred ? 'starred' : ''}" onclick="toggleStar('${f.id}')">★</button>
    `;
    
    // إضافة ميزة الضغط المطول للكارت
    setupLongPress(card, { type: 'file', id: f.id, name: f.name });
    
    grid.appendChild(card);
  });
}

// ... (بقية منطق الـ Sync والـ Auth كما هو في كودك الأصلي دون تعديل) ...
</script>
</body>
</html>
