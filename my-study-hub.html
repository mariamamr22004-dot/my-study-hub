<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Study Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  :root {
    --bg: #0f0e17;
    --surface: #1a1828;
    --surface2: #221f35;
    --accent: #7c6ff7;
    --accent2: #ff6b6b;
    --accent3: #43e97b;
    --accent4: #f9ca24;
    --text: #fffffe;
    --text-muted: #a7a9be;
    --border: #2e2b45;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Cairo', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    direction: rtl;
  }

  /* Animated background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 20%, rgba(124,111,247,0.12) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(67,233,123,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 60% 10%, rgba(255,107,107,0.08) 0%, transparent 40%);
    pointer-events: none;
    z-index: 0;
  }

  .container { position: relative; z-index: 1; }

  /* Header */
  .header {
    background: rgba(26,24,40,0.9);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 1rem 1.5rem;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-title {
    font-size: 1.6rem;
    font-weight: 900;
    background: linear-gradient(135deg, var(--accent), var(--accent3));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -0.5px;
  }

  .header-subtitle {
    font-size: 0.75rem;
    color: var(--text-muted);
    font-weight: 300;
  }

  /* Stats bar */
  .stats-bar {
    display: flex;
    gap: 0.75rem;
    padding: 1rem 1.5rem;
    overflow-x: auto;
    scrollbar-width: none;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 0.75rem 1rem;
    min-width: 100px;
    text-align: center;
    flex-shrink: 0;
    transition: all 0.2s;
  }

  .stat-card:hover { transform: translateY(-2px); border-color: var(--accent); }

  .stat-num {
    font-size: 1.4rem;
    font-weight: 900;
    background: linear-gradient(135deg, var(--accent), var(--accent3));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .stat-label { font-size: 0.65rem; color: var(--text-muted); margin-top: 2px; }

  /* Search */
  .search-section { padding: 0 1.5rem 1rem; }

  .search-input {
    width: 100%;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    padding: 0.85rem 1rem 0.85rem 3rem;
    color: var(--text);
    font-family: 'Cairo', sans-serif;
    font-size: 0.9rem;
    outline: none;
    transition: all 0.3s;
    direction: rtl;
  }

  .search-input:focus {
    border-color: var(--accent);
    background: var(--surface2);
    box-shadow: 0 0 0 3px rgba(124,111,247,0.15);
  }

  .search-wrapper { position: relative; }

  .search-icon {
    position: absolute;
    left: 1rem;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    font-size: 1.1rem;
  }

  /* Add button */
  .add-btn {
    background: linear-gradient(135deg, var(--accent), #5a4fcf);
    border: none;
    border-radius: 14px;
    color: white;
    font-family: 'Cairo', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    padding: 0.85rem 1.5rem;
    cursor: pointer;
    transition: all 0.3s;
    display: flex;
    align-items: center;
    gap: 0.5rem;
    width: 100%;
    justify-content: center;
    margin-top: 0.75rem;
    box-shadow: 0 4px 20px rgba(124,111,247,0.3);
  }

  .add-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(124,111,247,0.5);
  }

  .add-btn:active { transform: translateY(0); }

  /* Section headers */
  .section-header {
    padding: 0.5rem 1.5rem 0.75rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .section-title {
    font-size: 0.8rem;
    font-weight: 700;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* Link cards */
  .links-section { padding: 0 1.5rem; }

  .link-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 16px;
    padding: 1rem 1.1rem;
    margin-bottom: 0.75rem;
    cursor: pointer;
    transition: all 0.25s;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    gap: 0.85rem;
    animation: slideIn 0.3s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .link-card::before {
    content: '';
    position: absolute;
    right: 0;
    top: 0;
    bottom: 0;
    width: 3px;
    border-radius: 0 16px 16px 0;
    transition: all 0.3s;
  }

  .link-card:hover {
    border-color: var(--accent);
    background: var(--surface2);
    transform: translateX(-3px);
  }

  .link-card:hover::before { background: var(--accent); }

  /* Type icons */
  .type-icon {
    width: 42px;
    height: 42px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.2rem;
    flex-shrink: 0;
  }

  .type-lecture { background: rgba(124,111,247,0.2); }
  .type-section { background: rgba(67,233,123,0.2); }
  .type-summary { background: rgba(249,202,36,0.2); }
  .type-sheet { background: rgba(255,107,107,0.2); }
  .type-drive { background: rgba(38,198,218,0.2); }

  .link-info { flex: 1; min-width: 0; }

  .link-name {
    font-size: 0.9rem;
    font-weight: 700;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .link-meta {
    font-size: 0.72rem;
    color: var(--text-muted);
    margin-top: 3px;
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
  }

  .meta-tag {
    background: rgba(255,255,255,0.07);
    padding: 1px 8px;
    border-radius: 20px;
    font-size: 0.65rem;
  }

  /* Usage bar */
  .usage-dots {
    display: flex;
    gap: 2px;
    align-items: center;
  }

  .usage-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--border);
  }

  .usage-dot.active { background: var(--accent); }

  .link-actions {
    display: flex;
    gap: 0.4rem;
    flex-shrink: 0;
  }

  .action-btn {
    background: rgba(255,255,255,0.07);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.35rem 0.5rem;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 0.85rem;
    transition: all 0.2s;
    display: flex;
    align-items: center;
  }

  .action-btn:hover { background: rgba(124,111,247,0.2); color: var(--accent); border-color: var(--accent); }
  .action-btn.delete:hover { background: rgba(255,107,107,0.2); color: var(--accent2); border-color: var(--accent2); }

  /* Most used section */
  .most-used {
    background: linear-gradient(135deg, rgba(124,111,247,0.1), rgba(67,233,123,0.05));
    border: 1px solid rgba(124,111,247,0.2);
    border-radius: 16px;
    padding: 1rem;
    margin: 0 1.5rem 1rem;
  }

  .most-used-title {
    font-size: 0.75rem;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 0.75rem;
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }

  .most-used-chips {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
  }

  .chip {
    background: rgba(255,255,255,0.08);
    border: 1px solid var(--border);
    border-radius: 30px;
    padding: 0.4rem 0.85rem;
    font-size: 0.72rem;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }

  .chip:hover { background: rgba(124,111,247,0.2); border-color: var(--accent); color: var(--accent); }

  /* Modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(8px);
    z-index: 1000;
    display: none;
    align-items: flex-end;
    justify-content: center;
  }

  .modal-overlay.active { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px 24px 0 0;
    padding: 1.5rem;
    width: 100%;
    max-width: 600px;
    animation: slideUp 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  @keyframes slideUp {
    from { transform: translateY(100%); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  .modal-handle {
    width: 40px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 0 auto 1.25rem;
  }

  .modal-title {
    font-size: 1.2rem;
    font-weight: 900;
    margin-bottom: 1.25rem;
    background: linear-gradient(135deg, var(--accent), var(--accent3));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .form-group { margin-bottom: 1rem; }

  .form-label {
    display: block;
    font-size: 0.78rem;
    color: var(--text-muted);
    font-weight: 600;
    margin-bottom: 0.4rem;
  }

  .form-input, .form-select {
    width: 100%;
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 0.75rem 1rem;
    color: var(--text);
    font-family: 'Cairo', sans-serif;
    font-size: 0.88rem;
    outline: none;
    transition: all 0.3s;
    direction: rtl;
  }

  .form-input:focus, .form-select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(124,111,247,0.15);
  }

  .form-select option { background: var(--bg); }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }

  .type-selector {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 0.5rem;
    margin-bottom: 1rem;
  }

  .type-option {
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 0.6rem 0.3rem;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    font-size: 0.7rem;
    color: var(--text-muted);
  }

  .type-option:hover, .type-option.selected {
    border-color: var(--accent);
    background: rgba(124,111,247,0.15);
    color: var(--text);
  }

  .type-option-icon { font-size: 1.3rem; display: block; margin-bottom: 3px; }

  .save-btn {
    background: linear-gradient(135deg, var(--accent), #5a4fcf);
    border: none;
    border-radius: 14px;
    color: white;
    font-family: 'Cairo', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    padding: 0.9rem;
    cursor: pointer;
    width: 100%;
    transition: all 0.3s;
    box-shadow: 0 4px 20px rgba(124,111,247,0.3);
    margin-top: 0.5rem;
  }

  .save-btn:hover { box-shadow: 0 8px 30px rgba(124,111,247,0.5); transform: translateY(-1px); }

  .cancel-btn {
    background: transparent;
    border: 1.5px solid var(--border);
    border-radius: 14px;
    color: var(--text-muted);
    font-family: 'Cairo', sans-serif;
    font-weight: 600;
    font-size: 0.9rem;
    padding: 0.75rem;
    cursor: pointer;
    width: 100%;
    margin-top: 0.5rem;
    transition: all 0.2s;
  }

  .cancel-btn:hover { border-color: var(--accent2); color: var(--accent2); }

  /* Filter chips */
  .filters {
    display: flex;
    gap: 0.5rem;
    padding: 0 1.5rem 1rem;
    overflow-x: auto;
    scrollbar-width: none;
  }

  .filter-chip {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 30px;
    padding: 0.4rem 1rem;
    font-size: 0.75rem;
    font-family: 'Cairo', sans-serif;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    font-weight: 600;
  }

  .filter-chip.active, .filter-chip:hover {
    background: rgba(124,111,247,0.2);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 3rem 1.5rem;
    color: var(--text-muted);
  }

  .empty-icon { font-size: 3rem; margin-bottom: 1rem; opacity: 0.5; }
  .empty-text { font-size: 0.9rem; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--accent3);
    color: #0f0e17;
    font-family: 'Cairo', sans-serif;
    font-weight: 700;
    font-size: 0.85rem;
    padding: 0.75rem 1.5rem;
    border-radius: 30px;
    z-index: 9999;
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    box-shadow: 0 8px 30px rgba(67,233,123,0.4);
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .pb-safe { padding-bottom: 2rem; }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div style="display:flex; align-items:center; justify-content:space-between;">
    <div>
      <div class="header-title">📚 My Study Hub</div>
      <div class="header-subtitle">منظم لينكات المواد الدراسية</div>
    </div>
    <div style="font-size:1.5rem; opacity:0.6;">🎓</div>
  </div>
</div>

<div class="container pb-safe">

  <!-- Stats -->
  <div class="stats-bar" id="statsBar">
    <div class="stat-card">
      <div class="stat-num" id="totalCount">0</div>
      <div class="stat-label">إجمالي الروابط</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="subjectsCount">0</div>
      <div class="stat-label">مادة</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="lecturesCount">0</div>
      <div class="stat-label">محاضرة</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="sheetsCount">0</div>
      <div class="stat-label">حل شيت</div>
    </div>
  </div>

  <!-- Search & Add -->
  <div class="search-section">
    <div class="search-wrapper">
      <span class="search-icon">🔍</span>
      <input class="search-input" type="text" id="searchInput" placeholder="ابحث عن مادة، محاضرة..." oninput="filterLinks()">
    </div>
    <button class="add-btn" onclick="openModal()">
      <span>➕</span> إضافة رابط جديد
    </button>
  </div>

  <!-- Most Used -->
  <div class="most-used" id="mostUsedSection" style="display:none;">
    <div class="most-used-title">⚡ الأكثر استخداماً</div>
    <div class="most-used-chips" id="mostUsedChips"></div>
  </div>

  <!-- Filters -->
  <div class="filters">
    <button class="filter-chip active" onclick="setFilter('all', this)">الكل</button>
    <button class="filter-chip" onclick="setFilter('lecture', this)">📖 محاضرة</button>
    <button class="filter-chip" onclick="setFilter('section', this)">📝 سكشن</button>
    <button class="filter-chip" onclick="setFilter('summary', this)">📋 ملخص</button>
    <button class="filter-chip" onclick="setFilter('sheet', this)">✅ حل شيت</button>
    <button class="filter-chip" onclick="setFilter('drive', this)">☁️ درايف</button>
  </div>

  <!-- Section title -->
  <div class="section-header">
    <span class="section-title" id="sectionTitle">كل الروابط</span>
    <span style="font-size:0.75rem; color: var(--text-muted);" id="resultCount"></span>
  </div>

  <!-- Links list -->
  <div class="links-section" id="linksList"></div>

</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOnOverlay(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">✨ إضافة رابط جديد</div>

    <div class="form-group">
      <label class="form-label">اسم الرابط *</label>
      <input class="form-input" id="linkName" type="text" placeholder="مثال: محاضرة 1 - الفيزياء">
    </div>

    <div class="form-group">
      <label class="form-label">الرابط (Google Drive URL) *</label>
      <input class="form-input" id="linkUrl" type="url" placeholder="https://drive.google.com/...">
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">المادة *</label>
        <input class="form-input" id="linkSubject" type="text" placeholder="مثال: الفيزياء">
      </div>
      <div class="form-group">
        <label class="form-label">الترم</label>
        <input class="form-input" id="linkTerm" type="text" placeholder="مثال: الترم الأول">
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">السنة / المستوى</label>
      <input class="form-input" id="linkYear" type="text" placeholder="مثال: السنة الثانية">
    </div>

    <div class="form-group">
      <label class="form-label">نوع الملف</label>
      <div class="type-selector" id="typeSelector">
        <div class="type-option selected" data-type="lecture" onclick="selectType(this)">
          <span class="type-option-icon">📖</span>محاضرة
        </div>
        <div class="type-option" data-type="section" onclick="selectType(this)">
          <span class="type-option-icon">📝</span>سكشن
        </div>
        <div class="type-option" data-type="summary" onclick="selectType(this)">
          <span class="type-option-icon">📋</span>ملخص
        </div>
        <div class="type-option" data-type="sheet" onclick="selectType(this)">
          <span class="type-option-icon">✅</span>حل شيت
        </div>
        <div class="type-option" data-type="drive" onclick="selectType(this)">
          <span class="type-option-icon">☁️</span>درايف
        </div>
      </div>
    </div>

    <button class="save-btn" onclick="saveLink()">💾 حفظ الرابط</button>
    <button class="cancel-btn" onclick="closeModal()">إلغاء</button>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  // ===== DATA =====
  const STORAGE_KEY = 'myStudyHub_links';
  let links = [];
  let currentFilter = 'all';
  let selectedType = 'lecture';

  const typeConfig = {
    lecture:  { label: 'محاضرة', icon: '📖', class: 'type-lecture' },
    section:  { label: 'سكشن',   icon: '📝', class: 'type-section' },
    summary:  { label: 'ملخص',   icon: '📋', class: 'type-summary' },
    sheet:    { label: 'حل شيت', icon: '✅', class: 'type-sheet'   },
    drive:    { label: 'درايف',  icon: '☁️', class: 'type-drive'   },
  };

  // ===== STORAGE =====
  function saveToStorage() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(links));
  }

  function loadFromStorage() {
    try {
      const data = localStorage.getItem(STORAGE_KEY);
      if (data) links = JSON.parse(data);
    } catch(e) { links = []; }
  }

  // ===== RENDER =====
  function render() {
    updateStats();
    renderMostUsed();
    renderLinks();
  }

  function updateStats() {
    document.getElementById('totalCount').textContent = links.length;
    const subjects = new Set(links.map(l => l.subject).filter(Boolean));
    document.getElementById('subjectsCount').textContent = subjects.size;
    document.getElementById('lecturesCount').textContent = links.filter(l => l.type === 'lecture').length;
    document.getElementById('sheetsCount').textContent = links.filter(l => l.type === 'sheet').length;
  }

  function renderMostUsed() {
    const section = document.getElementById('mostUsedSection');
    if (links.length === 0) { section.style.display = 'none'; return; }

    const sorted = [...links].sort((a, b) => (b.uses || 0) - (a.uses || 0)).slice(0, 5);
    const topUsed = sorted.filter(l => (l.uses || 0) > 0);

    if (topUsed.length === 0) { section.style.display = 'none'; return; }

    section.style.display = 'block';
    const chips = document.getElementById('mostUsedChips');
    chips.innerHTML = topUsed.map(l => `
      <div class="chip" onclick="openLink('${l.id}')">
        <span>${typeConfig[l.type]?.icon || '📄'}</span>
        <span>${l.name}</span>
        <span style="opacity:0.5; font-size:0.6rem">${l.uses}×</span>
      </div>
    `).join('');
  }

  function renderLinks() {
    const search = document.getElementById('searchInput').value.toLowerCase();
    let filtered = links.filter(l => {
      const matchFilter = currentFilter === 'all' || l.type === currentFilter;
      const matchSearch = !search ||
        l.name?.toLowerCase().includes(search) ||
        l.subject?.toLowerCase().includes(search) ||
        l.term?.toLowerCase().includes(search) ||
        l.year?.toLowerCase().includes(search);
      return matchFilter && matchSearch;
    });

    // Sort by uses descending
    filtered.sort((a, b) => (b.uses || 0) - (a.uses || 0));

    const container = document.getElementById('linksList');
    const count = document.getElementById('resultCount');

    count.textContent = filtered.length > 0 ? `${filtered.length} رابط` : '';

    if (filtered.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">📭</div>
          <div class="empty-text">${links.length === 0 ? 'لا توجد روابط بعد. أضف أول رابط!' : 'لا توجد نتائج مطابقة'}</div>
        </div>`;
      return;
    }

    container.innerHTML = filtered.map(link => {
      const cfg = typeConfig[link.type] || typeConfig.drive;
      const uses = link.uses || 0;
      const dots = Array.from({length: 5}, (_, i) =>
        `<div class="usage-dot ${i < Math.min(uses, 5) ? 'active' : ''}"></div>`
      ).join('');

      return `
        <div class="link-card" onclick="openLink('${link.id}')">
          <div class="type-icon ${cfg.class}">${cfg.icon}</div>
          <div class="link-info">
            <div class="link-name">${link.name}</div>
            <div class="link-meta">
              ${link.subject ? `<span class="meta-tag">📚 ${link.subject}</span>` : ''}
              ${link.term ? `<span class="meta-tag">🗓 ${link.term}</span>` : ''}
              ${link.year ? `<span class="meta-tag">🎓 ${link.year}</span>` : ''}
              <span class="meta-tag">${cfg.icon} ${cfg.label}</span>
            </div>
            <div style="display:flex; align-items:center; gap:0.4rem; margin-top:5px;">
              <div class="usage-dots">${dots}</div>
              <span style="font-size:0.6rem; color:var(--text-muted);">${uses > 0 ? `فُتح ${uses} مرة` : 'لم يُفتح بعد'}</span>
            </div>
          </div>
          <div class="link-actions" onclick="event.stopPropagation()">
            <button class="action-btn" onclick="openLink('${link.id}')" title="فتح">🔗</button>
            <button class="action-btn delete" onclick="deleteLink('${link.id}')" title="حذف">🗑</button>
          </div>
        </div>`;
    }).join('');
  }

  // ===== ACTIONS =====
  function openLink(id) {
    const link = links.find(l => l.id === id);
    if (!link) return;
    link.uses = (link.uses || 0) + 1;
    saveToStorage();
    render();
    window.open(link.url, '_blank');
  }

  function deleteLink(id) {
    if (!confirm('هل أنت متأكد من حذف هذا الرابط؟')) return;
    links = links.filter(l => l.id !== id);
    saveToStorage();
    render();
    showToast('🗑 تم حذف الرابط');
  }

  function setFilter(type, el) {
    currentFilter = type;
    document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    const titles = { all: 'كل الروابط', lecture: 'المحاضرات', section: 'السكشنات', summary: 'الملخصات', sheet: 'حل الشيتات', drive: 'ملفات الدرايف' };
    document.getElementById('sectionTitle').textContent = titles[type] || 'الروابط';
    renderLinks();
  }

  function filterLinks() { renderLinks(); }

  // ===== MODAL =====
  function openModal() {
    document.getElementById('modalOverlay').classList.add('active');
    document.getElementById('linkName').value = '';
    document.getElementById('linkUrl').value = '';
    document.getElementById('linkSubject').value = '';
    document.getElementById('linkTerm').value = '';
    document.getElementById('linkYear').value = '';
    selectTypeByValue('lecture');
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('active');
  }

  function closeModalOnOverlay(e) {
    if (e.target === document.getElementById('modalOverlay')) closeModal();
  }

  function selectType(el) {
    document.querySelectorAll('.type-option').forEach(o => o.classList.remove('selected'));
    el.classList.add('selected');
    selectedType = el.dataset.type;
  }

  function selectTypeByValue(type) {
    document.querySelectorAll('.type-option').forEach(o => {
      o.classList.toggle('selected', o.dataset.type === type);
    });
    selectedType = type;
  }

  function saveLink() {
    const name = document.getElementById('linkName').value.trim();
    const url = document.getElementById('linkUrl').value.trim();
    const subject = document.getElementById('linkSubject').value.trim();
    const term = document.getElementById('linkTerm').value.trim();
    const year = document.getElementById('linkYear').value.trim();

    if (!name) { showToast('❌ من فضلك أدخل اسم الرابط', true); return; }
    if (!url) { showToast('❌ من فضلك أدخل الرابط', true); return; }
    if (!subject) { showToast('❌ من فضلك أدخل اسم المادة', true); return; }

    const link = {
      id: Date.now().toString(),
      name, url, subject, term, year,
      type: selectedType,
      uses: 0,
      createdAt: new Date().toISOString()
    };

    links.unshift(link);
    saveToStorage();
    closeModal();
    render();
    showToast('✅ تم إضافة الرابط بنجاح!');
  }

  // ===== TOAST =====
  function showToast(msg, isError = false) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.style.background = isError ? '#ff6b6b' : 'var(--accent3)';
    toast.style.color = isError ? 'white' : '#0f0e17';
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2500);
  }

  // ===== DEMO DATA =====
  function addDemoData() {
    if (links.length > 0) return;
    links = [
      { id: '1', name: 'محاضرة 1 - مقدمة في الفيزياء', url: 'https://drive.google.com', subject: 'الفيزياء', term: 'الترم الأول', year: 'السنة الأولى', type: 'lecture', uses: 8, createdAt: new Date().toISOString() },
      { id: '2', name: 'سكشن 3 - الاشتقاق', url: 'https://drive.google.com', subject: 'الرياضيات', term: 'الترم الأول', year: 'السنة الأولى', type: 'section', uses: 5, createdAt: new Date().toISOString() },
      { id: '3', name: 'ملخص الكيمياء العضوية', url: 'https://drive.google.com', subject: 'الكيمياء', term: 'الترم الثاني', year: 'السنة الثانية', type: 'summary', uses: 12, createdAt: new Date().toISOString() },
      { id: '4', name: 'حل شيت 5 - البرمجة', url: 'https://drive.google.com', subject: 'البرمجة', term: 'الترم الأول', year: 'السنة الثانية', type: 'sheet', uses: 3, createdAt: new Date().toISOString() },
    ];
    saveToStorage();
  }

  // ===== INIT =====
  loadFromStorage();
  addDemoData();
  render();
</script>
</body>
</html>
